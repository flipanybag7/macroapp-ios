name: Build IPA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  SCHEME: MacroApp
  PROJECT: MacroApp.xcodeproj

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Patch project format
        run: sed -i '' 's/objectVersion = 77;/objectVersion = 56;/g' MacroApp.xcodeproj/project.pbxproj

      - name: Build archive
        run: |
          set -o pipefail
          xcodebuild archive -project "$PROJECT" -scheme "$SCHEME" -configuration Release -archivePath "build/MacroApp.xcarchive" -destination "generic/platform=iOS" CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO DEVELOPMENT_TEAM="" IPHONEOS_DEPLOYMENT_TARGET="15.0" | tee build.log

      - name: Generate unsigned IPA
        if: success()
        run: |
          mkdir -p Payload
          cp -R build/MacroApp.xcarchive/Products/Applications/MacroApp.app Payload/
          brew install ldid-procursus 2>/dev/null || brew install ldid
          ldid -SMacroApp/entitlements.plist Payload/MacroApp.app/MacroApp
          zip -r MacroApp.ipa Payload
          rm -rf Payload

      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MacroApp.ipa
          path: MacroApp.ipa
          retention-days: 30

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
