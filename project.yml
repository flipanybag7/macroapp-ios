name: MacroApp
targets:
  MacroApp:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: MacroApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.macroapp.ios
        INFOPLIST_FILE: MacroApp/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
        CODE_SIGN_IDENTITY: "iPhone Developer"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        IPHONEOS_DEPLOYMENT_TARGET: "15.0"
